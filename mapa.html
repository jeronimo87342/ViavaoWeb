<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIVAO - Radar de Cobertura de Red</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; background: #000; }
        
        /* Estilo del panel de control del radar */
        .radar-overlay {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: rgba(0,0,0,0.85); border: 1px solid #1a3a8a;
            padding: 15px; color: white; font-family: 'Orbitron', sans-serif;
            border-radius: 4px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        /* Ajuste de los Popups para que coincidan con la estética */
        .leaflet-popup-content-wrapper {
            background: rgba(0,0,0,0.9); color: white;
            border: 1px solid #3b82f6; font-family: 'Rajdhani', sans-serif;
            border-radius: 4px;
        }
        .leaflet-popup-tip { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="radar-overlay">
        <h1 class="text-blue-500 tracking-widest text-lg font-bold">VIVAO RADAR</h1>
        <div id="radarStatus" class="text-[9px] text-gray-500 mt-1 tracking-wider">SISTEMA EN ESPERA...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyBFKirjCei95Afzajmdvg4hkgPa3etErwM",
  authDomain: "VIVAO-8e499.firebaseapp.com",
  projectId: "VIVAO-8e499",
  storageBucket: "VIVAO-8e499.firebasestorage.app",
  messagingSenderId: "475032258661",
  appId: "1:475032258661:web:c6039e7ab56d0466e51e8c",
  measurementId: "G-F5GHE40G60"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- CORRECCIÓN: Configuración del Mapa para evitar repetición ---
        const map = L.map('map', { 
            zoomControl: false, 
            worldCopyJump: false, // Evita que los marcadores salten entre mundos repetidos
            minZoom: 2,           // No permite alejar demasiado el zoom para que no se vea vacío
            maxZoom: 18           
        }).setView([20, 0], 3);   // Centrado global para ver todo el mundo central

        // --- CORRECCIÓN: Configuración de la capa de tiles para que NO se repita ---
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            noWrap: true,              // ESTA ES LA CLAVE: No repite el mapa horizontalmente
            bounds: [[-90, -180], [90, 180]] // Define los límites máximos del mundo
        }).addTo(map);

        const activeLayers = {}; // Diccionario para gestionar los radares activos

        // Escuchar cambios en la base de datos de ATC activos en tiempo real
        onSnapshot(collection(db, "atc_activos"), (snapshot) => {
            const status = document.getElementById('radarStatus');
            
            // Actualizar estado visual del panel
            if (snapshot.empty) {
                status.innerText = "SISTEMA EN ESPERA...";
                status.style.color = "#6b7280"; // Gris
            } else {
                status.innerText = "COBERTURA DE RED ACTIVA";
                status.style.color = "#4ade80"; // Verde
            }

            // LIMPIEZA: Eliminar del mapa los radares que ya no están activos en Firebase
            const activeIds = snapshot.docs.map(doc => doc.id);
            Object.keys(activeLayers).forEach(id => {
                if (!activeIds.includes(id)) {
                    map.removeLayer(activeLayers[id].marker);
                    map.removeLayer(activeLayers[id].circle);
                    delete activeLayers[id];
                }
            });

            // ACTUALIZACIÓN: Dibujar o mover los radares que están activos
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added" || change.type === "modified") {
                    // Si ya existía, lo quitamos para redibujarlo en la nueva posición
                    if (activeLayers[id]) {
                        map.removeLayer(activeLayers[id].marker);
                        map.removeLayer(activeLayers[id].circle);
                    }

                    // DIBUJAR ÁREA DE COBERTURA (El círculo azul solicitado)
                    const circle = L.circle([data.lat, data.lng], {
                        radius: 80000, // 80km de radio de cobertura sombreada
                        color: '#3b82f6',     // Borde azul
                        fillColor: '#3b82f6', // Relleno azul
                        fillOpacity: 0.15,    // Muy transparente
                        weight: 1,            // Grosor del borde
                        dashArray: '5, 10'    // Línea discontinua
                    }).addTo(map);

                    // DIBUJAR PUNTO CENTRAL DEL ATC
                    const marker = L.circleMarker([data.lat, data.lng], {
                        radius: 6,           // Punto pequeño
                        color: '#fff',       // Borde blanco
                        fillColor: '#3b82f6',// Relleno azul brillante
                        fillOpacity: 1,
                        weight: 2
                    }).addTo(map);

                    // Añadir Popup con la información del controlador
                    marker.bindPopup(`
                        <div style="text-align:center;">
                            <b style="font-size:14px;color:#3b82f6;">${data.callsign}</b><br>
                            <span style="font-size:12px;">FRECUENCIA: ${data.frecuencia}</span><br>
                            <span style="font-size:10px;opacity:0.7;">RANGO: ${data.rango}</span>
                        </div>
                    `);

                    // Guardar las capas para poder gestionarlas luego
                    activeLayers[id] = { marker, circle };
                }
            });
        });
    </script>
</body>
</html>
