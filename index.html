    <style>
        /* --- 1. FONDO Y CUERPO (ESTO ARREGLA EL DAÑO) --- */
body {
    margin: 0;
    padding: 0;
    background-color: #000000a2; /* Fondo negro profundo */
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    /* Si tienes una imagen de fondo, descomenta la línea de abajo */
    /* background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('tu-imagen.jpg') no-repeat center center fixed; */
    /* background-size: cover; */
}

/* --- 2. EL MENÚ (NAV) PARA PC --- */
nav {
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(11, 41, 207, 0.219); /* Negro con un poco de transparencia */
    padding: 15px 0;
    gap: 20px;
    border-bottom: 2px solid #00d4ff; /* Línea cian brillante abajo */
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    position: sticky;
    top: 0;
    z-index: 1000;
}

nav a {
    color: #00d4ff;
    text-decoration: none;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 1px;
    padding: 10px 15px;
    transition: 0.3s ease;
}

nav a:hover {
    color: #fff;
    text-shadow: 0 0 10px #00d4ff;
    background: rgba(0, 212, 255, 0.1);
    border-radius: 5px;
}

/* --- 3. BOTONES ESPECIALES (LOGIN/REGISTER) --- */
.btn-login {
    border: 1px solid #00d4ff;
    border-radius: 5px;
}

/* --- 4. ARREGLO PARA CELULAR (MOVIL) --- */
@media (max-width: 360px) {
    nav {
        flex-direction: column; /* Lista vertical */
        padding: 20px 0;
        gap: 12px;
    }

    nav a {
        display: block;
        width: 80%;
        text-align: center;
        padding: 15px;
        border: 1px solid rgba(0, 212, 255, 0.4);
        background: rgba(0, 212, 255, 0.05);
        border-radius: 8px;
        font-size: 16px;
    }
}
      </style>
</head>
