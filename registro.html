<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVAO - Registro de Pilotos</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #0d1117 0%, #000000 100%);
            color: white; display: flex; justify-content: center; align-items: center;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 40px; border-radius: 20px; width: 400px; text-align: center;
        }
        h1 { color: #00d4ff; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 30px; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(0, 0, 0, 0.5); border: 1px solid #222;
            border-radius: 12px; color: white; outline: none; box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: #00d4ff; }
        .btn-reg {
            width: 100%; padding: 16px; margin-top: 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #008fb3 100%);
            border: none; border-radius: 12px; color: #000;
            font-weight: 700; text-transform: uppercase; cursor: pointer;
            transition: 0.3s;
        }
        .btn-reg:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .footer-text { margin-top: 25px; font-size: 11px; color: #444; }
        a { color: #00d4ff; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <div class="register-card">
        <h1>VIVAO</h1>
        <p>RECLUTAMIENTO DE NUEVOS PILOTOS</p>
        
        <input type="text" id="nombre" placeholder="Nombre Completo">
        <input type="email" id="email" placeholder="Email (Será tu ID de acceso)">
        <input type="password" id="password" placeholder="Contraseña segura">
        
        <button class="btn-reg" onclick="register()">CREAR EXPEDIENTE</button>
        
        <p class="footer-text">
            ¿Ya tienes cuenta? <a href="login.html">Inicia Sesión</a><br><br>
            By CapiJero - VIVAO Network
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js";

        // TUS APIS REALES DE VIVAO
        const firebaseConfig = {
            apiKey: "AIzaSyBFKirjCei95Afzajmdvg4hkgPa3etErwM",
            authDomain: "nexus-8e499.firebaseapp.com",
            projectId: "nexus-8e499",
            storageBucket: "nexus-8e499.firebasestorage.app",
            messagingSenderId: "475032258661",
            appId: "1:475032258661:web:c6039e7ab56d0466e51e8c",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.register = async () => {
            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value.toLowerCase();
            const pass = document.getElementById('password').value;

            if (!nombre || !email || !pass) {
                alert("Capi, rellena todos los datos del formulario.");
                return;
            }

            try {
                // 1. Creamos el usuario en Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Creamos el documento en la colección "pilotos" (Firestore)
                // Usamos el UID de Firebase para que sea único
                await setDoc(doc(db, "pilotos", user.uid), {
                    nombre: nombre,
                    email: email,
                    rango: "Cadete",
                    horas_vuelo: 0,
                    fecha_ingreso: new Date().toISOString(),
                    discordId: null, // Se llenará cuando usen tu login con el link de Discord
                    verificacion_rol: null
                });

                alert("¡Bienvenido a la flota, " + nombre + "!");
                window.location.href = "login.html"; // Al terminar, los mandamos al login
            } catch (error) {
                alert("Fallo en el sistema VIVAO: " + error.message);
            }
        };
    </script>
</body>
</html>
