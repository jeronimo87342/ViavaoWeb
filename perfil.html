<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VIVAO - Centro de Operaciones</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');
        body { background: #050505; color: #e0e0e0; font-family: 'Rajdhani', sans-serif; margin: 0; padding: 20px; }
        .bg-glow { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 0%, #1a3a8a 0%, #000 70%); z-index: -1; top: 0; left: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 25px; border-radius: 8px; }
        h1, h2 { font-family: 'Orbitron', sans-serif; letter-spacing: 2px; text-transform: uppercase; }
        .stat-label { font-size: 10px; color: #3b82f6; letter-spacing: 2px; font-weight: 700; }
        input, textarea { background: rgba(0,0,0,0.6); border: 1px solid rgba(59, 130, 246, 0.2); padding: 10px; color: white; width: 100%; outline: none; border-radius: 4px; font-size: 13px; }
        .btn-VIVAO { background: #3b82f6; color: white; padding: 12px; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 2px; transition: 0.3s; width: 100%; margin-top: 15px; cursor: pointer; border: none; }
        .btn-VIVAO:hover { background: #2563eb; transform: translateY(-2px); }
        .grid-vuelo { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .logout-link { opacity: 0.3; transition: 0.3s; cursor: pointer; letter-spacing: 3px; font-size: 10px; margin-top: 40px; display: block; text-align: center; width: 100%; }
        .logout-link:hover { opacity: 1; color: #ef4444; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="max-w-6xl mx-auto">
        <div class="glass-card flex justify-between items-center mb-6">
            <div>
                <h1 id="userName" class="text-2xl text-white font-bold">CARGANDO...</h1>
                <p class="stat-label">RANGO: <span id="userRango" class="text-blue-400">---</span></p>
            </div>
            <div class="text-right">
                <p class="stat-label">HORAS DE VUELO</p>
                <p id="userHoras" class="text-3xl font-bold text-white">0.0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="glass-card lg:col-span-2">
                <h2 class="text-lg mb-6 border-l-4 border-blue-500 pl-4">Nuevo Plan de Vuelo</h2>
                <div class="grid-vuelo">
                    <div><label class="stat-label">CALLSIGN</label><input type="text" id="callsign" placeholder="AVA123"></div>
                    <div><label class="stat-label">AEROLÍNEA</label><input type="text" id="airline" placeholder="Avianca"></div>
                    <div><label class="stat-label">SALIDA (ICAO)</label><input type="text" id="dep" placeholder="SKBO"></div>
                    <div><label class="stat-label">LLEGADA (ICAO)</label><input type="text" id="arr" placeholder="SKRG"></div>
                    <div><label class="stat-label">ALTERNO</label><input type="text" id="altn" placeholder="SKCL"></div>
                    <div><label class="stat-label">AVIÓN</label><input type="text" id="aircraft" placeholder="A320neo"></div>
                    <div><label class="stat-label">SID / SALIDA</label><input type="text" id="sid" placeholder="AMV1K"></div>
                    <div><label class="stat-label">NIVEL (FL)</label><input type="number" id="fl" placeholder="360"></div>
                    <div class="col-span-2"><label class="stat-label">RUTA DE SIMBRIEF</label><textarea id="route" class="h-24" placeholder="Pega aquí la ruta completa..."></textarea></div>
                </div>
                <button onclick="enviarPlan()" class="btn-VIVAO">ENVIAR PLAN A DISCORD & DESPACHAR</button>
            </div>

            <div class="flex flex-col gap-6">
                <div class="glass-card text-center border-t-4 border-green-500">
                    <h2 class="text-sm mb-4">Estado Actual</h2>
                    <div id="statusInfo" class="py-6 bg-black/40 rounded">
                        <p class="opacity-30 italic text-xs">AERONAVE EN PLATAFORMA</p>
                    </div>
                    <div id="finishArea" class="hidden mt-4">
                        <button onclick="finalizarVuelo()" class="btn-VIVAO !bg-red-600">ATERRIZAJE CONFIRMADO</button>
                    </div>
                </div>

                <div id="atcPanel" class="glass-card hidden border-t-4 border-blue-500">
                    <h2 class="text-sm mb-4 text-blue-400">Terminal ATC</h2>
                    <input type="text" id="atcFreq" placeholder="Frecuencia (118.10)" class="mb-2">
                    <input type="text" id="atcPos" placeholder="Estación (SKBO_TWR)" class="mb-2">
                    <button onclick="toggleATC()" id="btnAtc" class="btn-VIVAO !bg-green-600">ENCENDER RADAR</button>
                </div>
            </div>
        </div>

        <a onclick="cerrarSesion()" class="logout-link">TERMINAR CONEXIÓN CON EL SERVIDOR (LOGOUT)</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc, increment, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFKirjCei95Afzajmdvg4hkgPa3etErwM",
            authDomain: "nexus-8e499.firebaseapp.com",
            projectId: "nexus-8e499",
            storageBucket: "nexus-8e499.firebasestorage.app",
            messagingSenderId: "475032258661",
            appId: "1:475032258661:web:c6039e7ab56d0466e51e8c",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const WEBHOOK_URL = "https://discord.com/api/webhooks/1485321179987185816/amg5rA8nBTSU1slyy-DiQ45vnXh-xhX8yESQ8sC6krwTsXksexIVvsOtZGn6kEawbIAf";

        let uidPiloto = "";
        let startTime = null;
        let userData = {};
        let atcActivo = false;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                uidPiloto = user.uid;
                const snap = await getDoc(doc(db, "pilotos", uidPiloto));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('userName').innerText = userData.nombre_usuario;
                    document.getElementById('userRango').innerText = userData.rango;
                    document.getElementById('userHoras').innerText = parseFloat(userData.horas_vuelo || 0).toFixed(1);

                    const rangosATC = ["AS1","AS2","AS3","ADC","APC","ACC"];
                    if (rangosATC.includes(userData.rango)) {
                        document.getElementById('atcPanel').classList.remove('hidden');
                    }
                }
            } else { window.location.href = "login.html"; }
        });

        window.enviarPlan = async () => {
            const plan = {
                callsign: document.getElementById('callsign').value.toUpperCase(),
                dep: document.getElementById('dep').value.toUpperCase(),
                arr: document.getElementById('arr').value.toUpperCase(),
                altn: document.getElementById('altn').value.toUpperCase(),
                aircraft: document.getElementById('aircraft').value.toUpperCase(),
                airline: document.getElementById('airline').value,
                sid: document.getElementById('sid').value.toUpperCase(),
                fl: document.getElementById('fl').value,
                route: document.getElementById('route').value
            };

            if(!plan.callsign || !plan.dep || !plan.arr) return alert("Faltan datos críticos.");

            const embed = {
                embeds: [{
                    title: "📄 NUEVO PLAN DE VUELO - VIVAO",
                    color: 3066993,
                    fields: [
                        { name: "✈️ Piloto", value: userData.nombre_usuario, inline: true },
                        { name: "🆔 Callsign", value: plan.callsign, inline: true },
                        { name: "🛫 Ruta", value: `${plan.dep} ➔ ${plan.arr}`, inline: true },
                        { name: "🛣️ Ruta SimBrief", value: "```" + plan.route + "```" }
                    ],
                    timestamp: new Date()
                }]
            };

            await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(embed) });

            startTime = new Date();
            document.querySelectorAll('input, textarea').forEach(el => el.disabled = true);
            document.getElementById('statusInfo').innerHTML = `<p class="text-blue-400 font-bold">${plan.callsign}</p><p id="timer" class="text-2xl">00:00:00</p>`;
            document.getElementById('finishArea').classList.remove('hidden');
            
            setInterval(() => {
                const dif = new Date() - startTime;
                const h = Math.floor(dif / 3600000).toString().padStart(2, '0');
                const m = Math.floor((dif % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((dif % 60000) / 1000).toString().padStart(2, '0');
                if(document.getElementById('timer')) document.getElementById('timer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        };

        window.finalizarVuelo = async () => {
            const horas = (new Date() - startTime) / 3600000;
            await updateDoc(doc(db, "pilotos", uidPiloto), { horas_vuelo: increment(horas) });
            location.reload();
        };

        window.toggleATC = async () => {
    const freq = document.getElementById('atcFreq').value;
    const posInput = document.getElementById('atcPos').value.toUpperCase();
    
    if(!freq || !posInput) return alert("Faltan datos de ATC.");

    // BASE DE DATOS DE COORDENADAS VIVAO
    const db_aeropuertos = {
        // COLOMBIA
        "SKBO": { lat: 4.701, lng: -74.146 },  // Bogotá
        "SKRG": { lat: 6.163, lng: -75.423 },  // Medellín (Rionegro)
        "SKCL": { lat: 3.543, lng: -76.381 },  // Cali
        "SKCG": { lat: 10.442, lng: -75.512 }, // Cartagena
        "SKSM": { lat: 11.119, lng: -74.230 }, // Santa Marta
        "SKCC": { lat: 7.927, lng: -72.511 },  // Cúcuta
        "SKPE": { lat: 4.812, lng: -75.739 },  // Pereira
        "SKBA": { lat: 10.889, lng: -74.780 }, // Barranquilla
        "SKSP": { lat: 12.584, lng: -81.711 }, // San Andrés
        
        // INTERNACIONAL (LATAM)
        "MPTO": { lat: 9.071, lng: -79.383 },  // Panamá (Tocumen)
        "SPJC": { lat: -12.021, lng: -77.114 }, // Lima
        "SAEZ": { lat: -34.822, lng: -58.535 }, // Buenos Aires (Ezeiza)
        "SBGR": { lat: -23.435, lng: -46.473 }, // São Paulo (Guarulhos)
        "SCEL": { lat: -33.393, lng: -70.785 }, // Santiago de Chile
        "MMMX": { lat: 19.436, lng: -99.072 },  // Ciudad de México
        
        // RUTAS LARGAS (LONG HAUL)
        "OMDB": { lat: 25.253, lng: 55.365 },  // Dubái
        "YSSY": { lat: -33.939, lng: 151.175 }, // Sídney
        "KJFK": { lat: 40.641, lng: -73.778 },  // Nueva York
        "KLAX": { lat: 33.941, lng: -118.408 }, // Los Ángeles
        "LEMD": { lat: 40.493, lng: -3.566 },   // Madrid Barajas
        "EGLL": { lat: 51.470, lng: -0.454 }    // Londres Heathrow
    };

    // Buscamos el ICAO en la base de datos (Ej: de "SKBO_TWR" extraemos "SKBO")
    const icao = posInput.split('_')[0];
    let lat, lng;

    if (db_aeropuertos[icao]) {
        lat = db_aeropuertos[icao].lat;
        lng = db_aeropuertos[icao].lng;
    } else {
        // Si no está en la lista, usamos Bogotá por defecto para que no falle
        console.log("Aeropuerto no en base de datos, usando coordenadas por defecto.");
        lat = 4.701; lng = -74.146;
    }

    try {
        const atcRef = doc(db, "atc_activos", uidPiloto);
        if (!atcActivo) {
            await setDoc(atcRef, {
                callsign: posInput,
                frecuencia: freq,
                lat: lat, 
                lng: lng,
                rango: userData.rango,
                timestamp: new Date()
            });
            document.getElementById('btnAtc').innerText = "CERRAR RADAR";
            document.getElementById('btnAtc').classList.replace('!bg-green-600', '!bg-red-600');
            atcActivo = true;
        } else {
            await deleteDoc(atcRef);
            document.getElementById('btnAtc').innerText = "ENCENDER RADAR";
            document.getElementById('btnAtc').classList.replace('!bg-red-600', '!bg-green-600');
            atcActivo = false;
        }
    } catch (e) { alert("Error: " + e.message); }
};

        window.cerrarSesion = () => {
            signOut(auth).then(() => {
                window.location.href = "login.html";
            }).catch((error) => {
                console.error("Error al cerrar sesión:", error);
            });
        };
    </script>
</body>
</html>
